name: medimatch
description: "MediMatch is an AI-powered healthcare MVP that matches symptoms to specialists and books doctors fast."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  cloud_firestore: ^6.2.0
  equatable: ^2.0.8
  firebase_auth: ^6.3.0
  firebase_core: ^4.6.0
  firebase_messaging: ^16.1.3
  firebase_storage: ^13.2.0
  flutter_local_notifications: ^21.0.0
  google_sign_in: ^7.2.0
  http: ^1.6.0
  image_picker: ^1.2.1
  intl: ^0.20.2
  provider: ^6.1.5+1
  shared_preferences: ^2.5.5
  timezone: ^0.11.0
  uuid: ^4.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.4
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/branding/
# fonts:
#   - family: Manrope
#     fonts:
#       - asset: assets/fonts/Manrope-Regular.ttf
#         weight: 400
#       - asset: assets/fonts/Manrope-Medium.ttf
#         weight: 500
#       - asset: assets/fonts/Manrope-SemiBold.ttf
#         weight: 600
#       - asset: assets/fonts/Manrope-Bold.ttf
#         weight: 700

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/branding/launcher_icon_placeholder.png
  remove_alpha_ios: true